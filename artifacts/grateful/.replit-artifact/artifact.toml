kind = "web"
previewPath = "/"
title = "Grateful"
version = "1.0.0"
id = "artifacts/grateful"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24260

[services.development]
run = "pnpm --filter @workspace/grateful run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grateful", "run", "build" ]
publicDir = "artifacts/grateful/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24260"
BASE_PATH = "/"
