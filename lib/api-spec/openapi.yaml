openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Grateful – Gratitude Journal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: entries
    description: Journal entry operations
  - name: prompts
    description: Writing prompt operations
  - name: streak
    description: Streak operations
  - name: summary
    description: Weekly summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List all journal entries
      description: Returns all journal entries ordered by date descending
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
    post:
      operationId: createEntry
      tags: [entries]
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryInput"
      responses:
        "201":
          description: Entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Entry for this date already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entries/{date}:
    get:
      operationId: getEntryByDate
      tags: [entries]
      summary: Get journal entry by date
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Entry found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateEntry
      tags: [entries]
      summary: Update an existing journal entry
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            description: Date in YYYY-MM-DD format
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntryUpdate"
      responses:
        "200":
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /entries/week/{startDate}:
    get:
      operationId: getWeeklySummary
      tags: [summary]
      summary: Get weekly summary starting from a given date
      parameters:
        - name: startDate
          in: path
          required: true
          schema:
            type: string
            description: Start date in YYYY-MM-DD format (typically Sunday)
      responses:
        "200":
          description: Weekly summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklySummary"

  /streak:
    get:
      operationId: getStreak
      tags: [streak]
      summary: Get current journaling streak
      responses:
        "200":
          description: Streak data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Streak"

  /prompts/daily:
    get:
      operationId: getDailyPrompt
      tags: [prompts]
      summary: Get today's writing prompt
      responses:
        "200":
          description: Daily prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyPrompt"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Entry:
      type: object
      required: [id, date, gratitudeItems, reflection, mood, createdAt]
      properties:
        id:
          type: integer
        date:
          type: string
          description: Date in YYYY-MM-DD format
        gratitudeItems:
          type: array
          items:
            type: string
          description: 1-3 gratitude items
        reflection:
          type: string
          description: Free-form reflection text
        mood:
          type: ["string", "null"]
          enum: ["great", "okay", "tough", null]
          description: Mood tag
        createdAt:
          type: string
          description: ISO timestamp

    EntryInput:
      type: object
      required: [date, gratitudeItems, reflection]
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        gratitudeItems:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 3
        reflection:
          type: string
        mood:
          type: ["string", "null"]
          enum: ["great", "okay", "tough", null]

    EntryUpdate:
      type: object
      properties:
        gratitudeItems:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 3
        reflection:
          type: string
        mood:
          type: ["string", "null"]
          enum: ["great", "okay", "tough", null]

    WeeklySummary:
      type: object
      required: [startDate, endDate, entries, totalEntries, moodBreakdown, allGratitudeItems]
      properties:
        startDate:
          type: string
        endDate:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/Entry"
        totalEntries:
          type: integer
        moodBreakdown:
          type: object
          required: [great, okay, tough, untagged]
          properties:
            great:
              type: integer
            okay:
              type: integer
            tough:
              type: integer
            untagged:
              type: integer
        allGratitudeItems:
          type: array
          items:
            type: string

    Streak:
      type: object
      required: [currentStreak, longestStreak, todayLogged]
      properties:
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        todayLogged:
          type: boolean

    DailyPrompt:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
